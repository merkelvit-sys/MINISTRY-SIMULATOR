<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Тренажёр служения — Pro</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Корневой контейнер: всё рендерится сюда из render.js -->
  <div id="app"></div>

  <!-- Модальное окно Библии (интерактивная Библия) -->
  <div class="modal-overlay" id="bibleModal">
    <div class="modal">
      <button class="modal-close-btn" id="closeModalBtn" title="Закрыть">✕</button>
      <h4 id="modalRef"></h4>
      <p id="modalText"></p>
    </div>
  </div>

  <!-- Порядок ВАЖЕН: данные -> движок -> рендер(+bootstrap).
       Классические скрипты (без type="module"), чтобы работал двойной клик по file://. -->
  <link rel="manifest" href="manifest.json" />
  <script src="sound.js"></script>
  <script src="i18n.js"></script>
  <script src="content.js"></script>
  <script src="engine.js"></script>
  <script src="avatar.js"></script>
  <script src="render.js"></script>
  <script src="pwa.js"></script>
  <script>
    if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
      navigator.serviceWorker.register("./sw.js").catch(() => {});
    }
  </script>
</body>
</html>
