<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Тренажёр служения — Pro</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Корневой контейнер: всё рендерится сюда из render.js -->
  <div id="app"></div>

  <!-- Модальное окно Библии (интерактивная Библия) -->
  <div class="modal-overlay" id="bibleModal">
    <div class="modal">
      <h4 id="modalRef"></h4>
      <p id="modalText"></p>
      <button class="btn" id="closeModalBtn">Закрыть</button>
    </div>
  </div>

  <!-- Порядок ВАЖЕН: данные -> движок -> рендер(+bootstrap).
       Классические скрипты (без type="module"), чтобы работал двойной клик по file://. -->
  <script src="sound.js"></script>
  <script src="content.js"></script>
  <script src="engine.js"></script>
  <script src="render.js"></script>
</body>
</html>
